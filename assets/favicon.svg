        <g id="Flat-vector-graphic--clean-design--simple-vector-style:-A-horizontal-data-flow-diagram-featuring-four-circular-icons--each-filled-with-Teal--0098A3-and-outlined-in-Slate-Gray--2E5266.-The-icons-represent-Upload--an-upward-arrow-originating-from-a-cloud-symbol---Analyze--a-magnifying-glass-with-a-gear-inside---Visualize--a-bar-chart---and-Report--a-document-with-horizontal-lines-.-Metallic-Silver--B4B7BA-arrows-connect-the-icons-in-sequence.-Labels-for-each-icon-are-positioned-directly-below--rendered-in-the-Inter-font-in-Off-White--F5F5F5.-The-background-is-a-solid-Charcoal--36454F.-The-overall-design-is-minimal-and-clean--with-consistent-spacing-maintained-between-all-elements." serif:id="Flat vector graphic, clean design, simple vector style: A horizontal data flow diagram featuring four circular icons, each filled with Teal #0098A3 and outlined in Slate Gray #2E5266. The icons represent Upload (an upward arrow originating from a cloud symbol), Analyze (a magnifying glass with a gear inside), Visualize (a bar chart), and Report (a document with horizontal lines). Metallic Silver #B4B7BA arrows connect the icons in sequence. Labels for each icon are positioned directly below, rendered in the Inter font in Off White #F5F5F5. The background is a solid Charcoal #36454F. The overall design is minimal and clean, with consistent spacing maintained between all elements." transform="matrix(1,0,0,1,-20.299693,-384.739665)">
