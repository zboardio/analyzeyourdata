# GitHub Actions CI/CD Pipeline
#
# Triggers:
#   - Push to main branch (auto-deploy of HEAD)
#   - Manual dispatch (on-demand deploy / rollback to any previously built SHA)
#
# Required Secrets (Settings → Secrets → Actions):
#   - VDS_HOST: VDS IP address or hostname
#   - VDS_USER: SSH username (e.g., root)
#   - VDS_SSH_KEY: Private SSH key for deployment
#
# What it does:
#   1. Build Docker image tagged with git short SHA (plus :latest)
#   2. Push both tags to GitHub Container Registry (ghcr.io)
#   3. SSH to VDS and run `docker stack deploy` with IMAGE_TAG=<sha>
#      Because the image reference in the service spec changes from one
#      SHA to another, Swarm performs a proper rolling update without any
#      `docker service update --force` hack.
#   4. Verify all 15 services are running the new SHA via /api/version.
#
# Manual rollback:
#   Actions → "Build and Deploy" → Run workflow
#     → image_tag: <previous-short-sha>
#   The build job is skipped; the deploy job re-deploys that tag from ghcr.io.

name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Image tag to deploy (leave empty to build from HEAD). Use to redeploy a specific SHA or roll back.'
        required: false
        default: ''

# Serialize deploys per branch so two rapid pushes can't race.
# cancel-in-progress=false — never cancel a deploy mid-rollout.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    # Skip build when a manual dispatch specifies an existing image tag (rollback path).
    if: github.event_name == 'push' || github.event.inputs.image_tag == ''
    permissions:
      contents: read
      packages: write

    outputs:
      git_commit: ${{ steps.vars.outputs.git_commit }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Get git commit short hash
        id: vars
        run: echo "git_commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.vars.outputs.git_commit }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ steps.vars.outputs.git_commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"

  deploy:
    name: Deploy to VDS
    runs-on: ubuntu-latest
    needs: [build]
    permissions: {}
    # Run when build succeeded, or when build was skipped because the
    # manual dispatch pinned an existing image_tag (rollback).
    if: always() && !cancelled() && (needs.build.result == 'success' || needs.build.result == 'skipped')
    permissions: {}

    steps:
      - name: Determine image tag to deploy
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.image_tag }}" ]; then
            TAG="${{ github.event.inputs.image_tag }}"
            MODE="manual dispatch (pin/rollback)"
          else
            TAG="${{ needs.build.outputs.git_commit }}"
            MODE="push auto-deploy"
          fi
          echo "image_tag=${TAG}" >> $GITHUB_OUTPUT
          {
            echo "## Deploy"
            echo ""
            echo "- **Mode:** ${MODE}"
            echo "- **Image tag:** \`${TAG}\`"
          } >> $GITHUB_STEP_SUMMARY

      - name: Deploy to VDS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          script: |
            set -e
            IMAGE_TAG="${{ steps.tag.outputs.image_tag }}"
            export IMAGE_TAG

            echo "=== Deployment started at $(date) ==="
            echo "Target image tag: ${IMAGE_TAG}"

            cd /opt/analyzeyourdata || { echo "Directory /opt/analyzeyourdata not found"; exit 1; }

            echo "Pulling ghcr.io/zboardio/analyzeyourdata:${IMAGE_TAG}..."
            docker pull "ghcr.io/zboardio/analyzeyourdata:${IMAGE_TAG}"

            echo "Deploying Swarm stack (IMAGE_TAG=${IMAGE_TAG})..."
            docker stack deploy -c docker-compose.cicd.yml ayd --with-registry-auth

            echo ""
            echo "=== Waiting for rolling update to converge ==="
            MAX_ATTEMPTS=8
            WAIT_BETWEEN=15
            FINAL_STATUS=""
            SUCCESS=0

            for attempt in $(seq 1 ${MAX_ATTEMPTS}); do
              sleep ${WAIT_BETWEEN}
              FAIL=0
              CHECKED=0
              ATTEMPT_STATUS=""
              for PORT in $(seq 8050 8064); do
                RESPONSE=$(curl -sf "http://127.0.0.1:${PORT}/api/version" 2>/dev/null || true)
                if [ -z "${RESPONSE}" ]; then
                  continue
                fi
                CHECKED=$((CHECKED + 1))
                if echo "${RESPONSE}" | grep -q "\"${IMAGE_TAG}\""; then
                  ATTEMPT_STATUS="${ATTEMPT_STATUS}  :${PORT} — OK (${IMAGE_TAG})"$'\n'
                else
                  ATTEMPT_STATUS="${ATTEMPT_STATUS}  :${PORT} — STALE (${RESPONSE})"$'\n'
                  FAIL=1
                fi
              done
              echo "Attempt ${attempt}/${MAX_ATTEMPTS}: ${CHECKED}/15 responding, stale=${FAIL}"
              FINAL_STATUS="${ATTEMPT_STATUS}"
              if [ ${FAIL} -eq 0 ] && [ ${CHECKED} -ge 15 ]; then
                SUCCESS=1
                break
              fi
            done

            echo ""
            echo "=== Final service status ==="
            echo "${FINAL_STATUS}"

            if [ ${SUCCESS} -eq 1 ]; then
              echo "=== Deploy OK — 15 services on tag ${IMAGE_TAG} ==="
            else
              echo "!!! Health checks failed after ${MAX_ATTEMPTS} attempts"
              echo "Inspect: docker service ls | grep ayd"
              exit 1
            fi

            echo "=== Deployment completed at $(date) ==="

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: failure()
    permissions: {}

    steps:
      - name: Create failure summary
        run: |
          echo "## Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY
