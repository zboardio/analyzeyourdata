# GitHub Actions CI/CD Pipeline
#
# Triggers:
#   - Push to main branch (auto-deploy)
#   - Manual dispatch (for on-demand deployments)
#
# Required Secrets (Settings → Secrets → Actions):
#   - VDS_HOST: VDS IP address or hostname
#   - VDS_USER: SSH username (e.g., root)
#   - VDS_SSH_KEY: Private SSH key for deployment
#
# What it does:
#   1. Build Docker image with git commit hash
#   2. Push to GitHub Container Registry (ghcr.io)
#   3. SSH to VDS and update Docker Swarm stack

name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_only:
        description: 'Skip build, deploy existing latest image'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build:
    name: Build and Push Image
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.deploy_only != 'true' }}
    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      git_commit: ${{ steps.vars.outputs.git_commit }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Get git commit short hash
        id: vars
        run: echo "git_commit=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_COMMIT=${{ steps.vars.outputs.git_commit }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image digest
        run: echo "Image pushed with digest ${{ steps.meta.outputs.digest }}"

  deploy:
    name: Deploy to VDS
    runs-on: ubuntu-latest
    needs: [build]
    if: always() && (needs.build.result == 'success' || github.event.inputs.deploy_only == 'true')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to VDS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VDS_HOST }}
          username: ${{ secrets.VDS_USER }}
          key: ${{ secrets.VDS_SSH_KEY }}
          script: |
            set -e

            echo "=== Deployment started at $(date) ==="

            # Navigate to app directory
            cd /opt/analyzeyourdata || { echo "Directory not found"; exit 1; }

            # Pull latest image
            echo "Pulling latest image..."
            docker pull ghcr.io/zboardio/analyzeyourdata:latest

            # Update stack with rolling deployment
            echo "Updating Docker Swarm stack..."
            docker stack deploy -c docker-compose.swarm.yml ayd --with-registry-auth

            # Wait for services to stabilize
            echo "Waiting for services to update..."
            sleep 10

            # Show service status
            echo "=== Service Status ==="
            docker service ls | grep ayd

            # Verify deployment
            echo "=== Verifying deployment ==="
            curl -s http://localhost:8050/api/version || echo "EN service check failed"

            echo "=== Deployment completed at $(date) ==="

  notify-failure:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: failure()

    steps:
      - name: Create failure summary
        run: |
          echo "## Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details." >> $GITHUB_STEP_SUMMARY
