# Docker Swarm Stack - CI/CD Deploy (GitHub Actions)
#
# Deploy:
#   docker stack deploy -c docker-compose.cicd.yml ayd
#
# Difference from docker-compose.local.yml:
#   - Uses ghcr.io registry image instead of local build
#   - IMAGE_TAG can be set by CI/CD pipeline
#
# The env_file directive loads variables directly from .env

networks:
  default:
    driver: overlay
    ipam:
      config:
        - subnet: 10.10.0.0/24

x-standard-deploy: &standard-deploy
  replicas: 1
  update_config:
    parallelism: 1
    delay: 10s
    failure_action: rollback
    order: start-first
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
  resources:
    limits:
      cpus: '1.0'
      memory: 2G
    reservations:
      cpus: '0.1'
      memory: 384M

x-high-traffic-deploy: &high-traffic-deploy
  replicas: 3
  update_config:
    parallelism: 1
    delay: 10s
    failure_action: rollback
    order: start-first
  restart_policy:
    condition: on-failure
    delay: 5s
    max_attempts: 3
  resources:
    limits:
      cpus: '1.5'
      memory: 2G
    reservations:
      cpus: '0.25'
      memory: 512M

x-common-settings: &common-settings
  image: ghcr.io/zboardio/analyzeyourdata:${IMAGE_TAG:-latest}
  env_file: .env
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8050/')"]
    interval: 30s
    timeout: 30s
    retries: 5
    start_period: 60s

services:
  app-en:
    <<: *common-settings
    ports:
      - "8050:8050"
    environment:
      - APP_LANGUAGE=en
    deploy:
      <<: *high-traffic-deploy

  app-es:
    <<: *common-settings
    ports:
      - "8055:8050"
    environment:
      - APP_LANGUAGE=es
    deploy:
      <<: *high-traffic-deploy

  app-cs:
    <<: *common-settings
    ports:
      - "8051:8050"
    environment:
      - APP_LANGUAGE=cs
    deploy:
      <<: *standard-deploy

  app-da:
    <<: *common-settings
    ports:
      - "8054:8050"
    environment:
      - APP_LANGUAGE=da
    deploy:
      <<: *standard-deploy

  app-de:
